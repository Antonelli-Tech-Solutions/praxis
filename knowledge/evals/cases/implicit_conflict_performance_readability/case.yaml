# Tier-B PROVISIONAL implicit-contradiction case (FR-021/FR-022). Two genuinely
# contradictory engineering preferences, phrased with DISJOINT vocabulary and NO
# negation cue, so cosine recall never pairs them (~0.45 or below). The AspectTagger
# assigns both the controlled-vocab aspect "performance-vs-readability", and the conflict path's
# same-tag recall surfaces the pair for the ConflictJudge. Replays offline from the
# committed aspect + conflict cassettes once recorded.
#
# xfail = provisional: kept ONLY if the owner judges the Tier-B gate cleared
# (FR-022). A working experiment XPASSes here; an unrecalled pair stays XFAIL.
id: implicit_conflict_performance_readability
component: knowledge_graph
substrate: vector
embedder: cached  # real vectors; the pair sits below the cosine floor by design
tag_model: openai/gpt-4o-mini  # AspectTagger; replayed from the committed aspect cassette
conflict_model: openai/gpt-4o-mini  # ConflictJudge; replayed from the committed conflict cassette
xfail: "Tier-B gate pending (FR-022): implicit-contradiction recall via aspect tags is unproven until the owner reviews the gate metrics"

seeded_insight:
  via_ingestor: []
  direct_to_graph:
    - "Prioritize raw execution performance in this codebase."
    - "Favor readability over micro-optimizations."

deterministic_checks:
  - name: implicit_contradiction_flagged
    ref: "knowledge.evals.deterministic_checks.text:regex_matches"
    params:
      pattern: "(?i)CONTRADICTION"
