# Outcome / trust feedback on facts — second domain (systemic, not one scenario).
#
#   * FAILED: "add a longer sleep before the assertion" — repeatedly tried, still
#     flaky; echoes the query wording (more cosine-similar).
#   * PROVEN: "poll the readiness condition instead of sleeping" — what fixed it.
#
# The check records 5 failures on the failed fact and 5 successes on the proven one,
# then asserts proven outranks failed. Fails without outcome weighting (failed, more
# similar advice wins); passes once success/failure counts feed Fact.utility and
# ranking folds it in.
#
# Needs a Postgres DSN (`just db-up`); harness SKIPs otherwise.
id: failed_advice_outranks_proven_test
component: knowledge_graph
substrate: vector
embedder: cached

seeded_insight:
  via_ingestor: []
  direct_to_graph:
    - "To make the flaky integration test reliable, add a longer sleep before the assertion."
    - "Replace timing waits with explicit polling on the readiness condition; await the signal instead of sleeping."

deterministic_checks:
  - name: proven_outranks_failed
    ref: "knowledge.evals.deterministic_checks.graph:retrieval_prefers_proven_over_failed"
    params:
      query: "How do I make the flaky integration test reliable?"
      failed_text: "To make the flaky integration test reliable, add a longer sleep before the assertion."
      proven_text: "Replace timing waits with explicit polling on the readiness condition; await the signal instead of sleeping."
      failed_failures: 5
      proven_successes: 5
      top_k: 2
