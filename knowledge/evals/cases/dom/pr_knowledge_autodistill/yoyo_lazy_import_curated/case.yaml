# Curated ceiling arm of the gating yoyo_lazy_import footgun (PR 1fdb8be / #48).
# Seeds the single hand-written IDEAL fact and reads it through the whole_file reader
# (force-injected, no retrieval gate), so the agent is GUARANTEED to see the perfect fact.
# This isolates knowledge-value from extraction/retrieval: if even this arm fails to flip
# the footgun, the cause is the knowledge itself (a no-go for the parent bet), not a
# distillation or retrieval gap. If it flips where the auto arm doesn't, the gap is
# extraction quality (the distilled phrasing was weaker than this ideal). Same seed_prompt
# as yoyo_lazy_import / yoyo_lazy_import_before; only the seed + reader differ.
id: autodistill_yoyo_lazy_import_curated
needs: [sandbox, file_io]
output_file: 0002_backfill_fact_source.py
reader: whole_file  # force-inject the ideal fact; no retrieval cutoff
seed_prompt: |
  Write a yoyo migration file `0002_backfill_fact_source.py` that backfills the
  `source` column on the `facts` table: for every row with a NULL/empty source, set
  it by calling `derive_source(text)` from the project's
  `knowledge.knowledge_graph.provenance` module. Use yoyo's `step()` API — the step
  function receives a psycopg connection `conn`. Edit only 0002_backfill_fact_source.py.
target_commit: "0000000000000000000000000000000000000000"
start_commit: null
repo: null

seeded_insight:
  via_ingestor: []
  direct_to_graph:
    - >-
      yoyo migrations must import the `knowledge` package lazily (inside the
      migration step function, not at module load), because yoyo execs the file with
      the repo root off `sys.path` — a top-level `from knowledge...` raises
      ModuleNotFoundError before the step runs. (See migrations/m2026_06_23_reject_rename.py.)

deterministic_checks:
  # Footgun ABSENT: no top-level (column-0) `import knowledge` / `from knowledge ...`.
  - name: lazy_knowledge_import
    ref: "knowledge.evals.deterministic_checks.text:regex_absent"
    params:
      pattern: '(?m)^(?:from|import)\s+knowledge\b'
  - name: produced_output
    ref: "knowledge.evals.deterministic_checks.builds:output_nonempty"
