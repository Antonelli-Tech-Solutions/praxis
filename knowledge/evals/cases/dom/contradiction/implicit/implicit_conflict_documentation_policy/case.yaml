# Implicit cross-vocabulary contradiction — the HONEST RESIDUAL of the stance path.
# The stance classifier maps a note onto a controlled tradeoff axis (subject=
# 'axis:<a>-vs-<b>', attribute='stance', value=<pole>); two opposing poles on the
# same axis then collide on one slot and the detector flags them deterministically.
# This catches 7/8 implicit pairs — but this pair's first note ("capture the
# reasoning in a written guide") does not reliably classify onto the documentation
# axis (the model reads it as a process/quality statement, not a docs-vs-self-
# documenting stance), so only one side gets a stance and the pair never collides.
# XFAIL = documented recall limitation of cheap-model stance classification, not a
# tuned pass. Flips to a real pass the day stance recall covers this phrasing.
id: implicit_conflict_documentation_policy
component: knowledge_graph
substrate: vector
embedder: cached  # real vectors; the pair sits below the cosine floor by design
conflict_model: openai/gpt-4o-mini  # stance classifier; replayed from the committed claim cassette
xfail: "honest residual: the first note does not reliably classify onto the documentation axis, so only one stance is emitted and the pair never collides — a cheap-model stance-recall limitation, not a tuned pass"

seeded_insight:
  via_ingestor: []
  direct_to_graph:
    - "Capture the reasoning behind each module in a written guide before shipping."
    - "Lean on expressive naming so the source needs no extra hand-holding."

deterministic_checks:
  - name: implicit_contradiction_flagged
    ref: "knowledge.evals.deterministic_checks.text:regex_matches"
    params:
      pattern: "(?i)CONTRADICTION"
