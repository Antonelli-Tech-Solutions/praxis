# GitLab CI/CD — deploy the PRAXIS website to AWS on merges into main.
#
# Two independent jobs, each gated by `rules:changes` so only the stack with a
# real change is rebuilt:
#   - deploy-backend:  PraxisBackendServiceStack (App Runner). Builds the backend
#       Docker image, so it needs a Docker daemon (docker:dind service).
#   - deploy-frontend: PraxisFrontendSiteStack (S3 + CloudFront). Rebuilds the Vite
#       bundle with the live backend ServiceUrl baked in, then uploads dist/.
#
# Ordering: backend runs in an earlier stage than frontend, so when both change the
# frontend is rebuilt against the freshly-deployed backend URL. If only one side
# changed, the other job simply isn't created.
#
# Requirements (already configured in the project):
#   - Shared runner available; main is a protected branch.
#   - CI/CD variables (Settings > CI/CD > Variables), masked + protected:
#       AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_DEFAULT_REGION (us-east-1)

stages:
  - lint
  - backend
  - frontend

# Lint runs on merge requests AND on main (post-merge safety net); the deploy jobs
# below stay main-only via their own `rules`. A feature-branch push with no open MR
# matches neither rule, so there are no duplicate branch+MR pipelines.
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - when: never

# Known/deployed Cognito values baked into the frontend bundle (see infra/README.md).
.cognito: &cognito
  VITE_COGNITO_USER_POOL_ID: us-east-1_4nAMe6bPK
  VITE_COGNITO_CLIENT_ID: 3ij653bq912pi4f17l5hn9iqqn
  VITE_COGNITO_REGION: us-east-1

# ---- Lint / static checks ----------------------------------------------------
# Each job invokes the repo's existing tool for that language and is gated by
# `rules:changes` so only the stacks a change actually touches are checked.

# Python: ruff (pyflakes + pycodestyle E4/E7/E9), config in pyproject.toml [tool.ruff].
python-lint:
  stage: lint
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: ["**/*.py", pyproject.toml, .gitlab-ci.yml]
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: ["**/*.py", pyproject.toml, .gitlab-ci.yml]
  script:
    - uvx ruff@0.15.20 check .

# Frontend (React/Vite): the repo's `lint` script is `tsc -b --noEmit` (type-check).
frontend-typecheck:
  stage: lint
  image: node:20-alpine
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: ["frontend-react/**/*", .gitlab-ci.yml]
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: ["frontend-react/**/*", .gitlab-ci.yml]
  script:
    - cd frontend-react
    - npm ci
    - npm run lint

# Infra (AWS CDK, TypeScript): `tsc` via the `build` script is the type-check gate.
infra-typecheck:
  stage: lint
  image: node:20-alpine
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: ["infra/**/*", .gitlab-ci.yml]
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: ["infra/**/*", .gitlab-ci.yml]
  script:
    - cd infra
    - npm ci
    - npm run build

# Go (session-capture wrapper): gofmt (formatting) + go vet (static analysis).
go-lint:
  stage: lint
  image: golang:1.25-alpine
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: ["session-capture/**/*", .gitlab-ci.yml]
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: ["session-capture/**/*", .gitlab-ci.yml]
  script:
    - cd session-capture/wrapper
    - test -z "$(gofmt -l .)" || { echo 'gofmt: the following files need formatting:'; gofmt -l .; exit 1; }
    - go vet ./...

deploy-backend:
  stage: backend
  # Serialize all deploys: only one job in this resource group runs at a time,
  # across pipelines, so concurrent merges can't run overlapping cdk deploys.
  resource_group: aws-deploy
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: "/certs/client"
    AWS_DEFAULT_REGION: us-east-1
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - Dockerfile
        - .dockerignore
        - pyproject.toml
        - uv.lock
        - knowledge/**/*
        - infra/lib/backend-service-stack.ts
        - infra/bin/app.ts
        - infra/cdk.json
        - infra/package.json
        - .gitlab-ci.yml
  before_script:
    - apk add --no-cache nodejs npm aws-cli
    - aws sts get-caller-identity
  script:
    - cd infra
    - npm ci
    - npx cdk deploy PraxisBackendServiceStack --require-approval never --outputs-file cdk-web-out.json
  artifacts:
    when: always
    paths:
      - infra/cdk-web-out.json
    expire_in: 30 days

deploy-frontend:
  stage: frontend
  resource_group: aws-deploy
  image: node:20-alpine
  variables:
    AWS_DEFAULT_REGION: us-east-1
    <<: *cognito
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - frontend-react/**/*
        - infra/lib/frontend-site-stack.ts
        - infra/bin/app.ts
        - infra/cdk.json
        - infra/package.json
        - .gitlab-ci.yml
  before_script:
    - apk add --no-cache aws-cli
    - aws sts get-caller-identity
  script:
    # Read the live backend URL from the already-deployed stack (no backend redeploy).
    - export SERVICE_URL=$(aws cloudformation describe-stacks --stack-name PraxisBackendServiceStack --query "Stacks[0].Outputs[?OutputKey=='ServiceUrl'].OutputValue" --output text)
    - echo "Backend ServiceUrl - $SERVICE_URL"
    - export VITE_PRAXIS_API_BASE_URL="$SERVICE_URL"
    - export VITE_PRAXIS_POSTGRES_API_BASE_URL="$SERVICE_URL"
    # Build the bundle with the backend URL + Cognito values inlined.
    - cd frontend-react
    - npm ci
    - npm run build
    # Deploy the S3/CloudFront stack (uploads the fresh dist/ and invalidates the CDN).
    - cd ../infra
    - npm ci
    - npx cdk deploy PraxisFrontendSiteStack --require-approval never --outputs-file cdk-web-out.json
  artifacts:
    when: always
    paths:
      - infra/cdk-web-out.json
    expire_in: 30 days
