# Attach mcp.praxiskg.com to the App Runner backend and create its Route 53
# records (cert-validation CNAMEs + the target CNAME). App Runner custom domains
# have no CloudFormation/CDK support, so this can't ride the normal `deploy`
# workflow — it's a manual, run-when-needed step.
#
# Safe to re-run: scripts/associate-backend-domain.mjs no-ops if the domain is
# already ACTIVE on the current service, and re-does the setup if the service was
# recreated (new ARN with no custom domain).
#
# Prereqs: the backend is deployed, and `mcp` is delegated to Route 53 in Cloudflare.
# Auth mirrors deploy.yml: AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY secrets +
# the AWS_DEFAULT_REGION repo variable.
name: associate-backend-domain

on:
  workflow_dispatch:

# Share deploy.yml's lock so this never runs while a deploy is recreating the service.
concurrency:
  group: aws-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  associate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_DEFAULT_REGION }}
      - run: aws sts get-caller-identity
      - name: Associate mcp.praxiskg.com + write Route 53 records
        working-directory: infra
        run: npm run domain:backend
